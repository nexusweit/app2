<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Sell Seed Bot</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Sora',sans-serif;
background:#0e0c0b;
color:#f5ebe0;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

/* LAVA BACKGROUND */

.lava-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
overflow:hidden;
background:radial-gradient(circle at 50% 120%, #1a0600 0%, #0e0c0b 70%);
}

.lava{
position:absolute;
width:400px;
height:400px;
border-radius:50%;
filter:blur(120px);
opacity:.18;
animation:lavaMove 18s ease-in-out infinite;
}

.lava1{
background:#ff4500;
bottom:-120px;
left:-120px;
}

.lava2{
background:#ff6b35;
bottom:-100px;
right:-100px;
animation-delay:-6s;
}

.lava3{
background:#d4380d;
top:-120px;
left:40%;
animation-delay:-12s;
}

@keyframes lavaMove{

0%,100%{transform:scale(1) translateY(0)}
50%{transform:scale(1.2) translateY(-40px)}

}

/* SPARKS */

.spark{
position:absolute;
width:3px;
height:3px;
background:#ff6b35;
border-radius:50%;
opacity:0;
animation:sparkFloat linear infinite;
}

@keyframes sparkFloat{

0%{
transform:translateY(100vh);
opacity:0;
}

10%{opacity:1}

100%{
transform:translateY(-10vh);
opacity:0;
}

}

/* SCREENS */

.screen{
display:none;
flex-direction:column;
align-items:center;
padding:25px;
padding-bottom:140px;
width:100%;
height:100%;
overflow-y:auto;
}

#screen-1{
display:flex;
}

/* LOGO */

.logo{
width:100px;
margin-top:20px;
margin-bottom:20px;
border-radius:20px;
box-shadow:0 0 60px rgba(255,69,0,.15);
}

/* TITLE */

h1{
font-size:22px;
font-weight:800;
text-align:center;
margin-bottom:10px;

background:linear-gradient(135deg,#ff6b35,#ff4500,#ff2e00);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.sub-text{
opacity:.5;
font-size:12px;
letter-spacing:1px;
margin-bottom:25px;
}

/* INPUT */

input{
width:80%;
max-width:280px;

padding:16px;

border:none;
border-radius:16px;

background:#1a1714;
color:#fff;

font-size:24px;
font-weight:700;
text-align:center;

box-shadow:
inset 4px 4px 10px rgba(0,0,0,.5),
inset -4px -4px 10px rgba(40,35,28,.4);
}

/* PRICE */

.price-display{

font-size:26px;
font-weight:800;

color:#ff6b35;

margin-top:25px;
margin-bottom:100px;

text-shadow:
0 0 10px rgba(255,69,0,.6),
0 0 25px rgba(255,69,0,.3);

animation:pricePulse 2s ease-in-out infinite;

}

@keyframes pricePulse{

0%,100%{
text-shadow:
0 0 10px rgba(255,69,0,.6),
0 0 25px rgba(255,69,0,.3);
}

50%{
text-shadow:
0 0 20px rgba(255,69,0,.9),
0 0 45px rgba(255,69,0,.5);
}

}

/* BUTTON */

.bottom-button{
position:fixed;
bottom:25px;
left:0;
right:0;
display:flex;
justify-content:center;
}

.btn-main{

background:linear-gradient(135deg,#ff4500,#ff6b35);

border:none;
color:#fff;

padding:18px 60px;

font-weight:700;
font-size:16px;

border-radius:16px;

box-shadow:0 10px 40px rgba(255,69,0,.35);

}

/* PAYMENT */

.pay-option{

background:#1a1714;

border:1px solid rgba(255,69,0,.08);

padding:18px;
margin:8px 0;

border-radius:18px;

width:90%;
max-width:340px;

display:flex;
align-items:center;

}

.pay-icon{
margin-right:12px;
font-size:20px;
}

/* SUCCESS */

.money-circle{

width:90px;
height:90px;

background:linear-gradient(135deg,#ff4500,#ff6b35);

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-size:40px;

margin-bottom:25px;

box-shadow:0 0 60px rgba(255,69,0,.4);

}

</style>
</head>

<body>

<div class="lava-bg">
<div class="lava lava1"></div>
<div class="lava lava2"></div>
<div class="lava lava3"></div>
</div>

<div id="sparks"></div>

<div id="screen-1" class="screen">

<img src="logo.png" class="logo">

<h1>Продавай Seed фразы правильно!</h1>

<div class="sub-text">
Введите количество на продажу
</div>

<input type="number" id="seedInput" placeholder="0" oninput="calcPrice()">

<div class="price-display" id="priceLabel">
Сумма к выдаче: 0₽
</div>

</div>

<div class="bottom-button" id="sellBtn">
<button class="btn-main" onclick="goToScreen(2)">ПРОДАТЬ</button>
</div>

<div id="screen-2" class="screen">

<h2 style="margin-bottom:25px;text-align:center;">
Выберите способ получения оплаты
</h2>

<div class="pay-option" onclick="goToScreen(3)">
<span class="pay-icon">💳</span>
Вывод на карту
</div>

<div class="pay-option" onclick="goToScreen(3)">
<span class="pay-icon">💎</span>
Криптовалюта USDT
</div>

<div class="pay-option" onclick="goToScreen(3)">
<span class="pay-icon">👛</span>
CryptoBot
</div>

</div>

<div id="screen-3" class="screen">

<div class="money-circle">💰</div>

<div style="text-align:center;max-width:320px;">
Ваши лиц. Seed фразы приняты.<br>
После проверки бот отправит деньги.
</div>

</div>

<script>

let tg=window.Telegram.WebApp;
tg.expand();

let currentPrice=0;

/* PRICE ANIMATION */

function animatePrice(newPrice){

let start=currentPrice;
let end=newPrice;

let startTime=null;

function step(t){

if(!startTime) startTime=t;

let progress=(t-startTime)/300;

if(progress>1) progress=1;

let value=Math.floor(start+(end-start)*progress);

document.getElementById("priceLabel").innerText=
"Сумма к выдаче: "+value.toLocaleString()+"₽";

if(progress<1){
requestAnimationFrame(step);
}

}

requestAnimationFrame(step);

currentPrice=newPrice;

}

function calcPrice(){

let input=document.getElementById("seedInput").value;

let price=0;

if(input==5000) price=4270;
else if(input==10000) price=8010;
else if(input==20000) price=12200;
else if(input==50000) price=21170;
else{

let val=parseInt(input);
if(isNaN(val)) val=0;

price=Math.floor(val*0.85);

}

animatePrice(price);

}

/* SCREEN */

function goToScreen(n){

document.getElementById("sellBtn").style.display="none";

document.querySelectorAll(".screen").forEach(el=>el.style.display="none");

document.getElementById("screen-"+n).style.display="flex";

}

/* SPARKS */

const sparks=document.getElementById("sparks");

for(let i=0;i<25;i++){

let s=document.createElement("div");

s.className="spark";

s.style.left=Math.random()*100+"%";

s.style.animationDuration=(Math.random()*6+5)+"s";

s.style.animationDelay=Math.random()*10+"s";

sparks.appendChild(s);

}

</script>

</body>
</html>
